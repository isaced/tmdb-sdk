name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run ci

      - name: Publish package
        run: |
          TAG=$(node -e "const v=require('./package.json').version; const m=v.match(/-([a-z]+)/); console.log(m?m[1]:'latest')")
          npm publish --provenance --access public --tag "$TAG"

      - uses: actions/checkout@v6
      - name: Publish package (jsr)
        run: npx jsr publish